services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password@1"
    ports:
      - "1433:1433" 
    volumes:
      - sqldata:/var/opt/mssql   # ← ovo dodaj

volumes:               # ← ovo dodaj na dno fajla
  sqldata:  